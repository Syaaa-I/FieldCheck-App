name: fieldcheck
description: "Field Check-In App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: "^3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  uuid: ^4.4.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    -   assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/FieldCheckIcon.png"